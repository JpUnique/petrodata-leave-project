<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Official Record | PetroData Leave Portal</title>

    <meta
      name="description"
      content="Official leave request archive and PDF download"
    />
    <meta name="theme-color" content="#004d40" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/approve.css" />
    <link rel="stylesheet" href="css/final_archive.css" />
  </head>

  <body>
    <div class="background-overlay" role="presentation"></div>

    <main class="auth-container">
      <article class="auth-card approval-card" id="printableArea">
        <div class="accent-bar" aria-hidden="true"></div>

        <header class="logo-section">
          <img
            src="assets/newlogo.png"
            alt="PetroData Logo"
            class="main-logo"
            width="120"
            height="120"
          />
          <h1>Official Leave Record</h1>
          <p id="sub-header">
            Finalized Document for
            <span id="displayStaffName" style="font-weight: 600; color: #004d40"
              >...</span
            >
          </p>
        </header>

        <form class="stylish-form" aria-label="Leave archive record">
          <fieldset>
            <legend class="section-legend">
              <i class="fas fa-user-circle"></i> Personnel Information
            </legend>

            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-id-badge"></i> Staff No</label>
                <div class="data-field" id="displayStaffNo">...</div>
              </div>
              <div class="display-wrapper">
                <label
                  ><i class="fas fa-calendar-check"></i> Date Employed</label
                >
                <div class="data-field" id="displayDateEmployed">...</div>
              </div>
            </div>

            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-briefcase"></i> Designation</label>
                <div class="data-field" id="displayDesignation">...</div>
              </div>
              <div class="display-wrapper">
                <label><i class="fas fa-phone"></i> Contact Phone</label>
                <div class="data-field" id="displayPhone">...</div>
              </div>
            </div>

            <div class="display-wrapper full-width">
              <label><i class="fas fa-building"></i> Department</label>
              <div class="data-field" id="displayDept">...</div>
            </div>
          </fieldset>

          <fieldset>
            <legend class="section-legend">
              <i class="fas fa-file-invoice"></i> Leave Particulars
            </legend>

            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-calendar-alt"></i> Leave Type</label>
                <div class="data-field" id="displayType">...</div>
              </div>
              <div class="display-wrapper">
                <label
                  ><i class="fas fa-hand-holding-usd"></i> Leave
                  Allowance</label
                >
                <div
                  class="data-field"
                  id="displayAllowance"
                  style="font-weight: 600"
                >
                  ...
                </div>
              </div>
            </div>

            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-clock"></i> Total Duration</label>
                <div class="data-field" id="displayTotalDays">...</div>
              </div>
              <div class="display-wrapper">
                <label><i class="fas fa-user-shield"></i> Relief Staff</label>
                <div class="data-field" id="displayRelief">...</div>
              </div>
            </div>

            <div class="display-wrapper full-width">
              <label
                ><i class="fas fa-calendar-day"></i> Leave Period
                (Inclusive)</label
              >
              <div class="data-field">
                <span id="displayStart">...</span>
                <i
                  class="fas fa-arrow-right"
                  style="margin: 0 15px; color: #888"
                ></i>
                <span id="displayEnd">...</span>
              </div>
            </div>

            <div class="display-wrapper full-width">
              <label
                ><i class="fas fa-map-marker-alt"></i> Contact Address during
                Leave</label
              >
              <div class="data-field" id="displayAddress">...</div>
            </div>
          </fieldset>

          <fieldset class="audit-section">
            <legend class="section-legend">
              <i class="fas fa-history"></i> Approval Audit Trail
            </legend>

            <div class="info-group">
              <div class="display-wrapper audit-highlight">
                <label><i class="fas fa-user-check"></i> Line Manager</label>
                <div
                  class="data-field decision-field"
                  id="displayManagerDecision"
                >
                  ...
                </div>
              </div>

              <div class="display-wrapper audit-highlight">
                <label><i class="fas fa-user-tie"></i> HR Review</label>
                <div class="data-field decision-field" id="displayHRDecision">
                  ...
                </div>
              </div>
            </div>

            <div
              class="display-wrapper full-width audit-highlight"
              style="border-left-color: #ffd700"
            >
              <label
                ><i class="fas fa-file-signature"></i> MD Final Approval</label
              >
              <div
                class="data-field decision-field"
                id="displayMDDecision"
                style="font-weight: 600; font-size: 1.1rem"
              >
                ...
              </div>
            </div>
          </fieldset>
        </form>

        <div
          class="no-print"
          style="margin-top: 30px; display: flex; justify-content: center"
        >
          <button
            id="downloadPdfBtn"
            type="button"
            class="btn-action btn-approve"
            style="max-width: 400px"
          >
            Download Official Record (PDF)
            <i class="fas fa-file-pdf" style="margin-left: 10px"></i>
          </button>
        </div>

        <footer class="auth-footer">
          <p>PetroData Management System. &copy; 2026</p>
        </footer>
      </article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/final_archive.js" defer></script>
  </body>
</html>
