<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Review and approve leave requests in the PetroData Staff Portal"
    />
    <meta name="theme-color" content="#004d40" />
    <title>Approve Leave | PetroData Leave Portal</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/forwarding.css" />
    <link rel="stylesheet" href="css/approve.css" />
  </head>

  <body>
    <div class="background-overlay" aria-hidden="true"></div>

    <main class="auth-container">
      <article class="auth-card approval-card">
        <div class="accent-bar" aria-hidden="true"></div>

        <header class="logo-section">
          <img
            src="assets/newlogo.png"
            alt="PetroData Logo"
            class="main-logo"
            width="150"
            height="150"
          />
          <h1>Leave Approval</h1>
          <p id="sub-header">
            Reviewing request for
            <span id="displayStaffName" style="font-weight: 600; color: #004d40"
              >...</span
            >
          </p>
        </header>

        <form class="stylish-form" id="approvalForm">
          <fieldset>
            <legend class="section-legend">
              <i class="fas fa-user-circle"></i> Staff Profile
            </legend>

            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-id-badge"></i> Staff No</label>
                <div class="data-field" id="displayStaffNo">Loading...</div>
              </div>
              <div class="display-wrapper">
                <label
                  ><i class="fas fa-calendar-check"></i> Date Employed</label
                >
                <div class="data-field" id="displayDateEmployed">
                  Loading...
                </div>
              </div>
            </div>

            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-briefcase"></i> Designation</label>
                <div class="data-field" id="displayDesignation">Loading...</div>
              </div>
              <div class="display-wrapper">
                <label><i class="fas fa-phone"></i> Contact Phone</label>
                <div class="data-field" id="displayPhone">Loading...</div>
              </div>
            </div>

            <div class="display-wrapper full-width">
              <label><i class="fas fa-building"></i> Department</label>
              <div class="data-field" id="displayDept">Loading...</div>
            </div>
          </fieldset>

          <fieldset>
            <legend class="section-legend">
              <i class="fas fa-file-alt"></i> Leave Details
            </legend>

            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-calendar-alt"></i> Leave Type</label>
                <div class="data-field" id="displayType">Loading...</div>
              </div>
              <div class="display-wrapper">
                <label
                  ><i class="fas fa-hand-holding-usd"></i> Leave
                  Allowance?</label
                >
                <div
                  class="data-field"
                  id="displayAllowance"
                  style="font-weight: 600"
                >
                  Loading...
                </div>
              </div>
            </div>

            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-clock"></i> Duration</label>
                <div class="data-field" id="displayTotalDays">Loading...</div>
              </div>
              <div class="display-wrapper">
                <label><i class="fas fa-user-shield"></i> Relief Staff</label>
                <div class="data-field" id="displayRelief">Loading...</div>
              </div>
            </div>

            <div class="display-wrapper full-width">
              <label><i class="fas fa-calendar-day"></i> Approval Dates</label>
              <div class="data-field">
                <span id="displayStart">...</span>
                <i
                  class="fas fa-arrow-right"
                  style="font-size: 0.8rem; margin: 0 10px; color: #888"
                ></i>
                <span id="displayEnd">...</span>
              </div>
            </div>

            <div class="display-wrapper full-width">
              <label
                ><i class="fas fa-map-marker-alt"></i> Contact Address</label
              >
              <div class="data-field" id="displayAddress">Loading...</div>
            </div>
          </fieldset>

          <fieldset>
            <div class="display-wrapper full-width">
              <label><i class="fas fa-info-circle"></i> Current Status</label>
              <div
                class="data-field"
                id="currentStatus"
                style="text-transform: lowercase; letter-spacing: 1px"
              >
                Loading...
              </div>
            </div>

            <div id="statusMessage" class="status-banner hidden"></div>

            <div class="display-wrapper full-width" id="hrEmailContainer">
              <label for="hrEmail"
                ><i class="fas fa-envelope-open-text"></i> Forward to HR
                (Email)</label
              >
              <div class="email-input-wrapper">
                <i class="fas fa-user-tie"></i>
                <input
                  type="email"
                  id="hrEmail"
                  placeholder="hr@petrodata.net"
                />
              </div>
            </div>

            <div id="actionButtons" class="approval-actions">
              <button
                id="approveBtn"
                type="button"
                class="btn-action btn-approve"
              >
                Approve <i class="fas fa-check-circle"></i>
              </button>
              <button
                id="rejectBtn"
                type="button"
                class="btn-action btn-reject"
              >
                Reject <i class="fas fa-times-circle"></i>
              </button>
            </div>
          </fieldset>
        </form>

        <footer class="auth-footer">
          <p>PetroData Management System &copy; 2026</p>
        </footer>
      </article>
    </main>
    <script src="js/approve.js" defer></script>
  </body>
</html>
