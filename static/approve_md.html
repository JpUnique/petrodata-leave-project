<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MD Final Verdict | PetroData Leave Portal</title>

    <meta
      name="description"
      content="Managing Director final approval for leave requests"
    />
    <meta name="theme-color" content="#004d40" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/approve.css" />
  </head>

  <body>
    <div class="background-overlay" role="presentation"></div>

    <main class="auth-container">
      <article class="auth-card approval-card">
        <div class="accent-bar" aria-hidden="true"></div>

        <header class="logo-section">
          <img
            src="assets/newlogo.png"
            alt="PetroData Logo"
            class="main-logo"
            width="100"
            height="100"
          />
          <h1>MD Final Verdict</h1>
          <p id="sub-header">
            Final review for
            <span id="displayStaffName" class="staff-name-highlight">...</span>
          </p>
        </header>

        <!-- Approval form -->
        <form class="stylish-form" aria-label="Leave approval form">
          <!-- Staff information section -->
          <fieldset>
            <legend class="sr-only">Staff Information</legend>

            <!-- Staff details grid -->
            <div class="info-group">
              <div class="display-wrapper">
                <label for="displayStaffNo">
                  <i class="fas fa-id-badge" aria-hidden="true"></i>
                  Staff No
                </label>
                <div class="data-field" id="displayStaffNo" aria-live="polite">
                  Loading...
                </div>
              </div>
              <div class="display-wrapper">
                <label for="displayDesignation">
                  <i class="fas fa-briefcase" aria-hidden="true"></i>
                  Designation
                </label>
                <div
                  class="data-field"
                  id="displayDesignation"
                  aria-live="polite"
                >
                  Loading...
                </div>
              </div>
            </div>

            <!-- Department -->
            <div class="display-wrapper full-width">
              <label for="displayDept">
                <i class="fas fa-building" aria-hidden="true"></i>
                Department
              </label>
              <div class="data-field" id="displayDept" aria-live="polite">
                Loading...
              </div>
            </div>
          </fieldset>

          <!-- Leave details section -->
          <fieldset>
            <legend class="sr-only">Leave Details</legend>

            <!-- Leave type and duration -->
            <div class="info-group">
              <div class="display-wrapper">
                <label for="displayType">
                  <i class="fas fa-calendar-alt" aria-hidden="true"></i>
                  Leave Type
                </label>
                <div class="data-field" id="displayType" aria-live="polite">
                  Loading...
                </div>
              </div>
              <div class="display-wrapper">
                <label for="displayTotalDays">
                  <i class="fas fa-clock" aria-hidden="true"></i>
                  Duration
                </label>
                <div
                  class="data-field"
                  id="displayTotalDays"
                  aria-live="polite"
                >
                  Loading...
                </div>
              </div>
            </div>

            <!-- Dates -->
            <div class="display-wrapper full-width">
              <label>
                <i class="fas fa-calendar-day" aria-hidden="true"></i>
                Approval Dates
              </label>
              <div class="data-field" aria-live="polite">
                <span id="displayStart">...</span>
                <i
                  class="fas fa-arrow-right"
                  aria-hidden="true"
                  style="font-size: 0.8rem; margin: 0 10px; color: #888"
                ></i>
                <span id="displayEnd">...</span>
              </div>
            </div>

            <!-- Relief staff -->
            <div class="display-wrapper full-width">
              <label for="displayRelief">
                <i class="fas fa-user-shield" aria-hidden="true"></i>
                Relief Staff
              </label>
              <div class="data-field" id="displayRelief" aria-live="polite">
                Loading...
              </div>
            </div>

            <!-- Contact address -->
            <div class="display-wrapper full-width">
              <label for="displayAddress">
                <i class="fas fa-map-marker-alt" aria-hidden="true"></i>
                Contact Address
              </label>
              <div class="data-field" id="displayAddress" aria-live="polite">
                Loading...
              </div>
            </div>
          </fieldset>
          <section class="form-section audit-section">
            <h2>Review History</h2>
            <div class="info-group audit-group">
              <div class="display-wrapper">
                <label
                  ><i class="fas fa-user-check"></i> Line Manager Review</label
                >
                <div
                  class="data-field decision-field"
                  id="displayManagerDecision"
                >
                  ...
                </div>
              </div>
              <div class="display-wrapper">
                <label><i class="fas fa-user-tie"></i> HR Recommendation</label>
                <div class="data-field decision-field" id="displayHRDecision">
                  ...
                </div>
              </div>
            </div>
          </section>

          <aside
            id="statusMessage"
            class="status-banner hidden"
            role="alert"
          ></aside>

          <div id="actionButtons" class="approval-actions">
            <button
              id="approveBtn"
              type="button"
              class="btn-action btn-approve"
            >
              <span class="btn-text">Final Approval</span>
              <i class="fas fa-check-double" id="approveIcon"></i>
              <i
                class="fas fa-spinner fa-spin"
                id="approveSpinner"
                style="display: none"
              ></i>
            </button>

            <button id="rejectBtn" type="button" class="btn-action btn-reject">
              <span class="btn-text">Final Rejection</span>
              <i class="fas fa-times-circle" id="rejectIcon"></i>
              <i
                class="fas fa-spinner fa-spin"
                id="rejectSpinner"
                style="display: none"
              ></i>
            </button>
          </div>
        </form>

        <footer class="auth-footer">
          <p>&copy; 2026 PetroData Management System.</p>
        </footer>
      </article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/approve_md.js" defer></script>
  </body>
</html>
