<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MD Final Verdict | PetroData Leave Portal</title>

    <meta
      name="description"
      content="Managing Director final approval for leave requests"
    />
    <meta name="theme-color" content="#004d40" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/approve.css" />
  </head>

  <body>
    <div class="background-overlay" role="presentation"></div>

    <main class="auth-container">
      <article class="auth-card approval-card">
        <div class="accent-bar" aria-hidden="true"></div>

        <header class="logo-section">
          <img
            src="assets/newlogo.png"
            alt="PetroData Logo"
            class="main-logo"
            width="100"
            height="100"
          />
          <h1>MD Final Verdict</h1>
          <p id="sub-header">
            Final review for
            <span id="displayStaffName" class="staff-name-highlight">...</span>
          </p>
        </header>

        <form class="stylish-form" aria-label="MD final approval form">
          <section class="form-section">
            <h2>Staff Information</h2>
            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-id-badge"></i> Staff No</label>
                <div class="data-field" id="displayStaffNo">Loading...</div>
              </div>
              <div class="display-wrapper">
                <label><i class="fas fa-briefcase"></i> Designation</label>
                <div class="data-field" id="displayDesignation">Loading...</div>
              </div>
            </div>
          </section>

          <section class="form-section">
            <h2>Leave Details</h2>
            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-calendar-alt"></i> Leave Type</label>
                <div class="data-field" id="displayType">Loading...</div>
              </div>
              <div class="display-wrapper">
                <label><i class="fas fa-clock"></i> Duration</label>
                <div class="data-field" id="displayTotalDays">Loading...</div>
              </div>
            </div>
            <div class="display-wrapper full-width">
              <label><i class="fas fa-calendar-day"></i> Proposed Dates</label>
              <div class="data-field" id="dateRange">
                <span id="displayStart">...</span>
                <i class="fas fa-arrow-right"></i>
                <span id="displayEnd">...</span>
              </div>
            </div>
          </section>

          <section class="form-section audit-trail-section">
            <h2>Review History</h2>
            <div class="info-group audit-group">
              <div class="display-wrapper">
                <label
                  ><i class="fas fa-user-check"></i> Line Manager Review</label
                >
                <div
                  class="data-field decision-field"
                  id="displayManagerDecision"
                >
                  ...
                </div>
              </div>
              <div class="display-wrapper">
                <label><i class="fas fa-user-tie"></i> HR Recommendation</label>
                <div class="data-field decision-field" id="displayHRDecision">
                  ...
                </div>
              </div>
            </div>
          </section>

          <aside
            id="statusMessage"
            class="status-banner hidden"
            role="alert"
          ></aside>

          <div id="actionButtons" class="approval-actions">
            <button
              id="approveBtn"
              type="button"
              class="btn-action btn-approve"
            >
              <span class="btn-text">Final Approval</span>
              <i class="fas fa-check-double" id="approveIcon"></i>
              <i
                class="fas fa-spinner fa-spin"
                id="approveSpinner"
                style="display: none"
              ></i>
            </button>

            <button id="rejectBtn" type="button" class="btn-action btn-reject">
              <span class="btn-text">Final Rejection</span>
              <i class="fas fa-times-circle" id="rejectIcon"></i>
              <i
                class="fas fa-spinner fa-spin"
                id="rejectSpinner"
                style="display: none"
              ></i>
            </button>
          </div>
        </form>

        <footer class="auth-footer">
          <p>&copy; 2026 PetroData Management System.</p>
        </footer>
      </article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/approve_md.js" defer></script>
  </body>
</html>
