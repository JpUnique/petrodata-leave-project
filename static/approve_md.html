<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MD Final Approval | PetroData Leave Portal</title>
    <meta
      name="description"
      content="Managing Director final leave request review"
    />
    <meta name="theme-color" content="#004d40" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/approve.css" />
    <link rel="stylesheet" href="css/forwarding.css" />
  </head>

  <body>
    <div class="background-overlay" aria-hidden="true"></div>

    <main class="auth-container">
      <article class="auth-card approval-card">
        <div class="accent-bar" aria-hidden="true"></div>

        <header class="logo-section">
          <img
            src="assets/newlogo.png"
            alt="PetroData Logo"
            class="main-logo"
            width="150"
            height="150"
          />
          <h1>Final Leave Approval</h1>
          <p id="sub-header">
            MD Review for
            <span id="displayStaffName" style="font-weight: 600; color: #004d40"
              >...</span
            >
          </p>
        </header>

        <form class="stylish-form" aria-label="MD leave review form">
          <fieldset>
            <legend class="section-legend">
              <i class="fas fa-user-tie"></i> Executive Summary
            </legend>

            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-id-badge"></i> Staff No</label>
                <div class="data-field" id="displayStaffNo">Loading...</div>
              </div>
              <div class="display-wrapper">
                <label
                  ><i class="fas fa-calendar-check"></i> Date Employed</label
                >
                <div class="data-field" id="displayDateEmployed">
                  Loading...
                </div>
              </div>
            </div>

            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-briefcase"></i> Designation</label>
                <div class="data-field" id="displayDesignation">Loading...</div>
              </div>
              <div class="display-wrapper">
                <label><i class="fas fa-building"></i> Department</label>
                <div class="data-field" id="displayDept">Loading...</div>
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend class="section-legend">
              <i class="fas fa-coins"></i> Leave & Allowance Details
            </legend>

            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-calendar-alt"></i> Leave Type</label>
                <div class="data-field" id="displayType">Loading...</div>
              </div>
              <div class="display-wrapper">
                <label
                  ><i class="fas fa-hand-holding-usd"></i> Allowance
                  Requested?</label
                >
                <div
                  class="data-field"
                  id="displayAllowance"
                  style="font-weight: 600"
                >
                  Loading...
                </div>
              </div>
            </div>

            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-clock"></i> Total Duration</label>
                <div class="data-field" id="displayTotalDays">Loading...</div>
              </div>
              <div class="display-wrapper">
                <label
                  ><i class="fas fa-calendar-day"></i> Resumption Date</label
                >
                <div class="data-field" id="displayEnd">Loading...</div>
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend class="section-legend">
              <i class="fas fa-history"></i> Approval History
            </legend>

            <div class="info-group">
              <div class="display-wrapper audit-highlight">
                <label
                  ><i class="fas fa-check-double"></i> Manager's Decision</label
                >
                <div
                  class="data-field"
                  id="displayManagerDecision"
                  style="font-size: 0.85rem; font-style: italic"
                >
                  Loading...
                </div>
              </div>

              <div
                class="display-wrapper audit-highlight"
                style="border-left-color: #00796b"
              >
                <label><i class="fas fa-user-shield"></i> HR Decision</label>
                <div
                  class="data-field"
                  id="displayHRDecision"
                  style="font-size: 0.85rem; font-style: italic"
                >
                  Loading...
                </div>
              </div>
            </div>
          </fieldset>

          <fieldset>
            <div id="statusMessage" class="status-banner hidden"></div>

            <div id="actionButtons" class="approval-actions">
              <button
                id="approveBtn"
                type="button"
                class="btn-action btn-approve"
              >
                Final Approval <i class="fas fa-file-signature"></i>
              </button>
              <button
                id="rejectBtn"
                type="button"
                class="btn-action btn-reject"
              >
                Decline Request <i class="fas fa-ban"></i>
              </button>
            </div>
          </fieldset>
        </form>

        <footer class="auth-footer">
          <p>PetroData Management System &copy; 2026</p>
        </footer>
      </article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/approve_md.js" defer></script>
  </body>
</html>
