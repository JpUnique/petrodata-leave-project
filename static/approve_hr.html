<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR Review | PetroData Leave Portal</title>

    <meta
      name="description"
      content="HR leave request review and approval system"
    />
    <meta name="theme-color" content="#004d40" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/approve.css" />
    <link rel="stylesheet" href="css/forwarding.css" />
    <link rel="stylesheet" href="css/loader.css" />
  </head>

  <body>
    <div class="background-overlay" role="presentation"></div>

    <main class="auth-container">
      <article class="auth-card approval-card">
        <div class="accent-bar" aria-hidden="true"></div>

        <header class="logo-section">
          <img
            src="assets/newlogo.png"
            alt="PetroData Logo"
            class="main-logo"
            width="100"
            height="100"
          />
          <h1>HR Leave Review</h1>
          <p id="sub-header">
            Reviewing request for
            <span id="displayStaffName" class="staff-name-highlight">...</span>
          </p>
        </header>

        <form
          id="hrReviewForm"
          class="stylish-form"
          aria-label="Leave review form"
        >
          <section class="form-section">
            <h2>Staff Information</h2>
            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-id-badge"></i> Staff No</label>
                <div class="data-field" id="displayStaffNo">Loading...</div>
              </div>
              <div class="display-wrapper">
                <label><i class="fas fa-briefcase"></i> Designation</label>
                <div class="data-field" id="displayDesignation">Loading...</div>
              </div>
            </div>
          </section>

          <section class="form-section">
            <h2>Leave Details</h2>
            <div class="info-group">
              <div class="display-wrapper">
                <label><i class="fas fa-calendar-alt"></i> Leave Type</label>
                <div class="data-field" id="displayType">Loading...</div>
              </div>
              <div class="display-wrapper">
                <label><i class="fas fa-clock"></i> Duration</label>
                <div class="data-field" id="displayTotalDays">Loading...</div>
              </div>
            </div>
          </section>

          <section class="form-section audit-section">
            <h2>Approval Chain</h2>
            <div class="display-wrapper full-width audit-highlight">
              <label
                ><i class="fas fa-user-check"></i> Line Manager Decision</label
              >
              <div
                class="data-field decision-field"
                id="displayManagerDecision"
              >
                Loading...
              </div>
            </div>
          </section>

          <section class="forwarding-box">
            <div class="workflow-content">
              <h3><i class="fas fa-paper-plane"></i> Forward to MD</h3>

              <div class="input-group">
                <label for="mdEmail">Managing Director Email</label>
                <div class="email-input-wrapper">
                  <i class="fas fa-user-check" aria-hidden="true"></i>
                  <input
                    type="email"
                    id="mdEmail"
                    placeholder="md@petrodata.net"
                    required
                  />
                </div>
                <small class="field-hint"
                  >Enter the MD's official email address</small
                >
              </div>
            </div>
          </section>

          <div class="approval-actions">
            <button
              id="approveBtn"
              type="button"
              class="btn-action btn-approve"
            >
              <span class="btn-text">Approve</span>
              <i class="fas fa-check-circle" id="approveIcon"></i>
              <i
                class="fas fa-spinner fa-spin"
                id="approveSpinner"
                style="display: none"
              ></i>
            </button>

            <button id="rejectBtn" type="button" class="btn-action btn-reject">
              <span class="btn-text">Reject</span>
              <i class="fas fa-times-circle" id="rejectIcon"></i>
              <i
                class="fas fa-spinner fa-spin"
                id="rejectSpinner"
                style="display: none"
              ></i>
            </button>
          </div>
        </form>

        <footer class="auth-footer">
          <p>&copy; 2026 PetroData Management System.</p>
        </footer>
      </article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/auth.js"></script>
    <script src="js/approve_hr.js" defer></script>
  </body>
</html>
